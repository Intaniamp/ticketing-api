    type: object
  models.StudioRequest:
    properties:
      cinema_id:
        example: 7
        type: integer
      studio_name:
        example: Regular
        type: string
    type: object
  models.User:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      password:
        type: string
      phone:
        type: string
      role:
        description: 'enum: "user" atau "admin"'
        type: string
    type: object
host: localhost:3000
info:
  contact: {}
  description: API backend untuk aplikasi pemesanan tiket bioskop
  title: Ticketing API
  version: "1.0"
paths:
  /booking:
    get:
      description: Mengembalikan seluruh daftar booking dari semua user di dalam sistem
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Booking'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Ambil semua pesanan (Khusus Admin)
      tags:
      - Booking
    post:
      consumes:
      - application/json
      description: Memesan kursi. Status awal otomatis 'pending'. Menerapkan penguncian
        kursi (Seat Locking).
      parameters:
      - description: Data Booking
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.BookingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Booking'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Buat pesanan tiket (Booking)
      tags:
      - Booking
  /booking/{id}:
    get:
      description: Mengembalikan detail lengkap satu tiket (Film, Bioskop, Jadwal,
        Kursi)
      parameters:
      - description: Booking ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.BookingDetailResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Ambil detail E-Ticket
      tags:
      - Booking
  /booking/my-history:
    get:
      description: Mengembalikan daftar pesanan ringkas milik user yang sedang login
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Booking'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Ambil riwayat pesanan user
      tags:
      - Booking
  /cinema:
    get:
      description: Mengembalikan daftar seluruh bioskop
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Cinema'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Ambil semua bioskop
      tags:
      - Cinema
    post:
      consumes:
      - application/json
      description: Menambahkan data bioskop baru ke dalam sistem (khusus admin)
      parameters:
      - description: Data Bioskop
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CinemaRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Cinema'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Tambah bioskop baru
      tags:
      - Cinema
  /cinema/{id}:
    delete:
      description: Menghapus data bioskop berdasarkan ID (khusus admin)
      parameters:
      - description: Cinema ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Hapus bioskop
      tags:
      - Cinema
    get:
      description: Mengembalikan detail satu bioskop
      parameters:
      - description: Cinema ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Cinema'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Ambil bioskop berdasarkan ID
      tags:
      - Cinema
    patch:
      consumes:
      - application/json
      description: Memperbarui data bioskop berdasarkan ID (khusus admin)
      parameters:
      - description: Cinema ID
        in: path
        name: id
        required: true
        type: integer
      - description: Data Bioskop
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CinemaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Cinema'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update bioskop
      tags:
      - Cinema
  /city:
