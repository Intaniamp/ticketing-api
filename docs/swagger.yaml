        example: Salah pilih jam tayang
        type: string
    type: object
  models.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      phone:
        type: string
    type: object
  models.Schedule:
    properties:
      date:
        example: "2026-06-03"
        type: string
      film_id:
        example: 1
        type: integer
      id:
        example: 1
        type: integer
      price:
        example: 40000
        type: number
      studio_id:
        example: 32
        type: integer
      time:
        example: "13:00:00"
        type: string
    type: object
  models.ScheduleRequest:
    properties:
      date:
        example: "2026-06-03"
        type: string
      film_id:
        example: 1
        type: integer
      price:
        example: 40000
        type: number
      studio_id:
        example: 32
        type: integer
      time:
        example: "13:00:00"
        type: string
    type: object
  models.Seat:
    properties:
      id:
        example: 1
        type: integer
      seat_number:
        example: A1
        type: string
      studio_id:
        example: 1
        type: integer
    type: object
  models.SeatStatus:
    properties:
      id:
        example: 1
        type: integer
      seat_number:
        example: F7
        type: string
