      email:
        type: string
      id:
        type: string
      name:
        type: string
      phone:
        type: string
      role:
        type: string
    type: object
  models.Booking:
    properties:
      booking_date:
        example: "2026-06-05 14:30:00"
        type: string
      expired_at:
        example: "2026-06-05 14:35:00"
        type: string
      id:
        example: 98231a54-f58c-48a0-9c2b...
        type: string
      schedule_id:
        example: 1
        type: integer
      status:
        example: pending
        type: string
      total_price:
        example: 60000
        type: number
      user_id:
        example: user-uuid-456
        type: string
    type: object
  models.BookingDetailResponse:
    properties:
      cinema_name:
        example: XX1 Living World
        type: string
      date:
        example: "2026-04-19"
        type: string
      expired_at:
        example: "2026-06-05 14:35:00"
        type: string
      film_title:
        example: Scream 7
        type: string
      id:
        example: 98231a54-f58c-48a0-9c2b...
        type: string
      order_id:
        example: '#CM-98231A54'
        type: string
      poster_url:
        example: uploads/posters/poster.jpg
        type: string
      seats:
        example:
        - F7
        - F8
        items:
          type: string
        type: array
      status:
        example: success
        type: string
      time:
        example: "17:30"
        type: string
      total_price:
        example: 60000
        type: number
    type: object
  models.BookingRequest:
    properties:
      schedule_id:
        example: 1
        type: integer
      seat_ids:
        example:
        - 15
        - 16
        - 17
        items:
          type: integer
        type: array
    type: object
  models.BulkSeatRequest:
    properties:
      seat_numbers:
        example:
        - A1
        - A2
        - A3
        - B1
        - B2
        - B3
        items:
          type: string
        type: array
      studio_id:
        example: 1
        type: integer
    type: object
  models.Cinema:
    properties:
      address:
        example: Beachwalk Shopping Center Lt. 2, Jl. Pantai Kuta
        type: string
      cinema_name:
        example: Beachwalk XXI
        type: string
      city_id:
        example: 1
        type: integer
      id:
        example: 1
        type: integer
    type: object
  models.CinemaRequest:
    properties:
      address:
        example: Beachwalk Shopping Center Lt. 2, Jl. Pantai Kuta
        type: string
      cinema_name:
        example: Beachwalk XXI
        type: string
      city_id:
        example: 1
        type: integer
    type: object
  models.City:
    properties:
      city_name:
        example: Jakarta
        type: string
      id:
        example: 1
        type: integer
    type: object
  models.CityRequest:
    properties:
      city_name:
        example: Jakarta
        type: string
    type: object
  models.ErrorResponse:
    properties:
      message:
        type: string
    type: object
  models.Film:
    properties:
      age_rating:
        type: string
      duration:
        type: integer
      genres:
        items:
          $ref: '#/definitions/models.Genre'
        type: array
      id:
        type: integer
      poster_url:
        type: string
      release_year:
        type: integer
      synopsis:
        type: string
      title:
        type: string
    type: object
  models.FilmRequest:
    properties:
      age_rating:
        example: 16+
