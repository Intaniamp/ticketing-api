      title:
        example: Scream 7
        type: string
    type: object
  models.Genre:
    properties:
      genre_name:
        example: Action
        type: string
      id:
        example: 1
        type: integer
    type: object
  models.GenreRequest:
    properties:
      genre_name:
        example: Action
        type: string
    type: object
  models.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  models.Payment:
    properties:
      amount:
        example: 60000
        type: number
      booking_id:
        example: booking-uuid-456
        type: string
      id:
        example: pay-uuid-123
        type: string
      payment_date:
        example: "2026-06-05 14:30:00"
        type: string
      payment_method:
        example: OVO
        type: string
      payment_status:
        example: success
        type: string
    type: object
  models.PaymentRequest:
    properties:
      booking_id:
        example: booking-uuid-456
        type: string
      payment_method:
        example: Gopay
        type: string
    type: object
  models.Refund:
    properties:
      booking_id:
        example: booking-uuid-456
        type: string
      id:
        example: ref-uuid-123
        type: string
      refund_amount:
        example: 60000
        type: number
      refund_date:
        example: "2026-06-05 15:00:00"
        type: string
    type: object
  models.RefundRequest:
    properties:
      booking_id:
        example: booking-uuid-456
        type: string
